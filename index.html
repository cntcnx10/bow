<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Profile - Dumbo of Jupiter</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Prompt:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --jupiter-gradient: linear-gradient(135deg, #f39c12, #d35400);
            --galaxy-purple: #6a0dad;
            --neon-blue: #00d4ff;
            --glass: rgba(10, 10, 30, 0.7);
        }

        body {
            background: #020617;
            background-image: 
                radial-gradient(white 1px, transparent 1px),
                radial-gradient(rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 50px 50px, 100px 100px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Prompt', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* เอฟเฟกต์แสงเหนือ (Nebula) */
        .nebula {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(106, 13, 173, 0.3) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            filter: blur(80px);
            z-index: -1;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 40px;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px rgba(0, 212, 255, 0.2);
            position: relative;
        }

        /* วงแหวนดาวเคราะห์รอบรูปโปรไฟล์ */
        .img-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #fff;
            object-fit: cover;
            position: relative;
            z-index: 2;
        }

        .planet-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(75deg);
            width: 220px;
            height: 220px;
            border: 8px double rgba(243, 156, 18, 0.5);
            border-radius: 50%;
            z-index: 1;
            animation: rotateRing 10s linear infinite;
        }

        @keyframes rotateRing {
            to { transform: translate(-50%, -50%) rotateX(75deg) rotateZ(360deg); }
        }

        h1 { font-family: 'Montserrat'; font-weight: 600; font-size: 1.8rem; margin-bottom: 5px; }
        .title { color: var(--neon-blue); letter-spacing: 2px; font-size: 0.9rem; margin-bottom: 20px; }

        /* แถบค่าพลัง (Stats) */
        .stats-container {
            margin: 20px 0;
            text-align: left;
        }

        .stat-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            background: var(--jupiter-gradient);
            box-shadow: 0 0 10px #f39c12;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            font-size: 0.8rem;
        }

        .info-box span { display: block; color: #94a3b8; font-size: 0.7rem; }

        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(0, 212, 255, 0.1), transparent);
            position: absolute;
            top: -100px;
            left: 0;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <div class="nebula"></div>

    <div class="card">
        <div class="scanline"></div>
        
        <div class="img-container">
            <div class="planet-ring"></div>
            <img src="วรรณิษา เจ็กสูงเนิน.jpg" class="profile-img">
        </div>

        <h1>วรรณิษา เจ็กสูงเนิน</h1>
        <div class="title">CEO OF JUPITER SECTOR</div>

        <div class="stats-container">
            <div style="display:flex; justify-content: space-between; font-size: 0.7rem;">
                <span>Cosmic Energy</span>
                <span>99.9%</span>
            </div>
            <div class="stat-bar"><div class="stat-fill" style="width: 99%;"></div></div>
            
            <div style="display:flex; justify-content: space-between; font-size: 0.7rem; margin-top: 10px;">
                <span>Mind Reading Accuracy</span>
                <span>MAX</span>
            </div>
            <div class="stat-bar"><div class="stat-fill" style="width: 100%; background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue);"></div></div>
        </div>

        <div class="info-grid">
            <div class="info-box">
                <span>Code Name</span>
                <strong>DUMBO-01</strong>
            </div>
            <div class="info-box">
                <span>Spacecraft</span>
                <strong>Nimbus 2000X</strong>
            </div>
            <div class="info-box">
                <span>Languages</span>
                <strong>All Milky Way</strong>
            </div>
            <div class="info-box">
                <span>Home Planet</span>
                <strong>Jupiter (Gaseous)</strong>
            </div>
        </div>

        <p style="font-size: 0.7rem; margin-top: 20px; color: #64748b; font-style: italic;">
            "บริหารดวงดาวด้วยความเร็วแสง และเสกออเดอร์ด้วยพลังจิต"
        </p>
    </div>

</body>
</html>
