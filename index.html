<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Profile - Dumbo Galaxy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Prompt:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: rgba(123, 31, 162, 0.6); /* Purple Glow */
            --secondary-glow: rgba(0, 191, 255, 0.4); /* Deep Sky Blue */
            --glass-bg: rgba(5, 10, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.15);
            --jupiter-orange: #ffab40;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* พื้นหลังห้วงอวกาศลึก */
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Prompt', sans-serif;
            color: #ffffff;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* เอฟเฟกต์ทางช้างเผือก */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: var(--primary-glow);
            filter: blur(150px);
            top: -10%;
            left: -10%;
            z-index: -1;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 0.8; }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(123, 31, 162, 0.2);
            position: relative;
            z-index: 10;
        }

        /* Profile Image Space Style */
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 6px;
            background: linear-gradient(135deg, #7b1fa2, #00bfff);
            object-fit: cover;
            box-shadow: 0 0 30px var(--secondary-glow);
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 1px;
            margin-bottom: 2px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            background: linear-gradient(to right, #fff, #e0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nickname {
            color: var(--jupiter-orange);
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .id-badge {
            font-size: 0.75rem;
            color: #94a3b8;
            letter-spacing: 4px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00bfff;
            margin-bottom: 12px;
            text-align: left;
            border-left: 3px solid #7b1fa2;
            padding-left: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .ability-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            border: 1px solid rgba(123, 31, 162, 0.3);
            transition: 0.3s;
        }

        .ability-box:hover {
            background: rgba(123, 31, 162, 0.2);
            border-color: #00bfff;
            transform: translateY(-2px);
        }

        .info-panel {
            text-align: left;
            font-size: 0.85rem;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-item {
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
        }

        .info-label {
            color: #94a3b8;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            color: #f8fafc;
            font-weight: 300;
        }

        .btn-connect {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(45deg, #4a148c, #01579b);
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: 0.4s;
        }

        .btn-connect:hover {
            letter-spacing: 4px;
            background: linear-gradient(45deg, #7b1fa2, #0288d1);
            box-shadow: 0 0 25px var(--primary-glow);
        }

        /* ดาวระยิบระยับ */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="card">
        <img src="วรรณิษา เจ็กสูงเนิน.jpg" alt="Dumbo" class="profile-img">
        
        <h1>วรรณิษา เจ็กสูงเนิน</h1>
        <div class="nickname">โบว์ (ดัมโบ้) | อายุ 200 ปี</div>
        <div class="id-badge">ID: 6650100218</div>

        <div class="section-title">Cosmic Abilities</div>
        <div class="grid">
            <div class="ability-box">🚀 บินได้</div>
            <div class="ability-box">👻 หายตัว</div>
            <div class="ability-box">🔮 เสกของ</div>
            <div class="ability-box">🧠 อ่านใจ</div>
        </div>

        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">Education</span>
                <span class="info-value">สถาบันการจัดการกาแลคซี่</span>
            </div>
            <div class="info-item" style="margin-top: 10px;">
                <span class="info-label">Current Position</span>
                <span class="info-value">ผู้บริหารประจำดาวพฤหัสบดี (Jupiter Executive)</span>
            </div>
        </div>

        <button class="btn btn-connect">Jump into Orbit</button>
    </div>

</body>
</html>
