<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Profile - Dumbo of Jupiter</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Prompt:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --jupiter-primary: #f39c12;
            --jupiter-secondary: #d35400;
            --jupiter-gradient: linear-gradient(135deg, #f39c12, #d35400);
            --galaxy-purple: #6a0dad;
            --neon-blue: #00d4ff;
            --glass: rgba(5, 5, 20, 0.8);
        }

        body {
            background: #020617;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(106, 13, 173, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(white 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 60px 60px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Prompt', sans-serif;
            color: white;
            overflow-x: hidden;
            margin: 0;
        }

        /* เอฟเฟกต์ Nebula วิ่งไปมาจางๆ */
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            z-index: -1;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 40px;
            width: 450px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 0, 0, 1), 0 0 30px rgba(243, 156, 18, 0.15);
            position: relative;
            overflow: hidden;
        }

        /* ตกแต่งมุมการ์ดแบบ High-tech */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 40px; height: 40px;
            border-top: 3px solid var(--jupiter-primary);
            border-left: 3px solid var(--jupiter-primary);
            border-top-left-radius: 40px;
        }

        .img-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 25px rgba(243, 156, 18, 0.5);
        }

        /* วงแหวนดาวเคราะห์รอบรูป */
        .planet-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(75deg);
            width: 240px;
            height: 240px;
            border: 4px solid var(--jupiter-primary);
            border-radius: 50%;
            z-index: 1;
            opacity: 0.6;
            animation: rotateRing 12s linear infinite;
        }

        @keyframes rotateRing {
            to { transform: translate(-50%, -50%) rotateX(75deg) rotateZ(360deg); }
        }

        h1 { font-family: 'Montserrat'; font-weight: 600; font-size: 1.7rem; margin-bottom: 5px; color: #fff; }
        .nickname { color: var(--jupiter-primary); font-size: 1rem; margin-bottom: 5px; font-weight: 500; }
        .id-badge { color: #94a3b8; font-size: 0.75rem; letter-spacing: 4px; margin-bottom: 25px; }

        /* ส่วนของความสามารถพิเศษ */
        .abilities-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-blue);
            margin-bottom: 15px;
            text-align: left;
            border-left: 3px solid var(--neon-blue);
            padding-left: 10px;
        }

        .ability-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .ability-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Stats & Info Area */
        .info-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 25px;
            padding: 20px;
            text-align: left;
        }

        .info-row {
            margin-bottom: 12px;
        }

        .info-row:last-child { margin-bottom: 0; }

        .label { display: block; font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .value { display: block; font-size: 0.9rem; color: #e2e8f0; font-weight: 300; }

        .scanline {
            width: 100%;
            height: 10px;
            background: rgba(0, 212, 255, 0.2);
            position: absolute;
            top: 0; left: 0;
            box-shadow: 0 0 15px var(--neon-blue);
            animation: scan 6s linear infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
    </style>
</head>
<body>

    <div class="nebula"></div>

    <div class="card">
        <div class="scanline"></div>
        
        <div class="img-container">
            <div class="planet-ring"></div>
            <img src="วรรณิษา เจ็กสูงเนิน.jpg" class="profile-img" alt="Executive Portrait">
        </div>

        <h1>วรรณิษา เจ็กสูงเนิน</h1>
        <div class="nickname">"ดัมโบ้" (โบว์) | อายุ 200 ปี</div>
        <div class="id-badge">UNIT ID: 6650100218</div>

        <div class="abilities-title">Celestial Powers</div>
        <div class="ability-grid">
            <div class="ability-item">✨ เสกทุกอย่าง</div>
            <div class="ability-item">☁️ บินได้</div>
            <div class="ability-item">🫥 หายตัว</div>
            <div class="ability-item">👁️ อ่านใจ</div>
        </div>

        <div class="info-panel">
            <div class="info-row">
                <span class="label">Current Sector</span>
                <span class="value">ผู้บริหารประจำดาวพฤหัสบดี (Jupiter Executive)</span>
            </div>
            <div class="info-row">
                <span class="label">Academy</span>
                <span class="value">สถาบันการจัดการกาแลคซี่</span>
            </div>
        </div>

        <p style="font-size: 0.7rem; margin-top: 25px; color: #4b5563; font-style: italic; letter-spacing: 1px;">
            SECURED DATA | TOP SECRET ACCESS ONLY
        </p>
    </div>

</body>
</html>
