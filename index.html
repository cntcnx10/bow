<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Profile - Dumbo Jupiter</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --jupiter-gold: #f39c12;
            --deep-space: #020817;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--deep-space);
            color: white;
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* พื้นหลังดวงดาวมิติลึก */
        .stars-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #999, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: starsMove 100s linear infinite;
            opacity: 0.3;
            z-index: -1;
        }

        @keyframes starsMove {
            from { transform: translate(0, 0); }
            to { transform: translate(-50%, -50%); }
        }

        /* การ์ดโฮโลแกรม */
        .holo-card {
            position: relative;
            width: 380px;
            background: rgba(10, 20, 40, 0.8);
            border-radius: 20px;
            padding: 2px; /* สำหรับขอบวิ่ง */
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* ขอบแสงนีออนวิ่ง */
        .holo-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--primary-cyan));
            animation: rotateBorder 4s linear infinite;
        }

        @keyframes rotateBorder {
            100% { transform: rotate(360deg); }
        }

        .inner-card {
            position: relative;
            background: var(--deep-space);
            border-radius: 18px;
            padding: 30px;
            z-index: 1;
        }

        /* รูปโปรไฟล์แบบ Hexagon/Circle Hybrid */
        .profile-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            position: relative;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--primary-cyan);
            object-fit: cover;
            filter: drop-shadow(var(--neon-glow));
        }

        .orbit {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 1px dashed var(--jupiter-gold);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Typography */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: white;
            margin-bottom: 5px;
            text-align: center;
            letter-spacing: 2px;
        }

        .badge {
            background: rgba(243, 156, 18, 0.2);
            color: var(--jupiter-gold);
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid var(--jupiter-gold);
            width: 100%;
            text-align: center;
        }

        /* Info Section */
        .data-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .data-label {
            font-size: 0.6rem;
            color: var(--primary-cyan);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .data-value {
            font-size: 0.85rem;
            font-weight: 400;
        }

        /* Power Icons */
        .power-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .power-icon {
            text-align: center;
            font-size: 1.2rem;
            background: rgba(0, 242, 255, 0.1);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            transition: 0.3s;
        }

        .power-icon:hover {
            background: var(--primary-cyan);
            color: black;
            transform: translateY(-5px);
        }

        .footer-text {
            font-size: 0.55rem;
            text-align: center;
            margin-top: 20px;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="stars-bg"></div>

    <div class="holo-card">
        <div class="inner-card">
            <div class="profile-container">
                <div class="orbit"></div>
                <img src="วรรณิษา เจ็กสูงเนิน.jpg" class="profile-img" alt="Executive Portrait">
            </div>

            <h1>วรรณิษา เจ็กสูงเนิน</h1>
            <div class="badge">JUPITER SECTOR EXECUTIVE • AGE 200</div>

            <div class="data-section">
                <div class="data-label">Identity Status</div>
                <div class="data-value">ชื่อเล่น: โบว์ | ฉายา: ดัมโบ้</div>
                <div class="data-value" style="font-size: 0.7rem; color: #888;">ID: 6650100218</div>
            </div>

            <div class="data-section">
                <div class="data-label">Educational Background</div>
                <div class="data-value">สถาบันการจัดการกาแลคซี่</div>
            </div>

            <div class="data-label" style="text-align: center;">Activated Abilities</div>
            <div class="power-grid">
                <div class="power-icon" title="บินได้">☁️</div>
                <div class="power-icon" title="หายตัว">🫥</div>
                <div class="power-icon" title="เสกของ">🪄</div>
                <div class="power-icon" title="อ่านใจ">🧠</div>
            </div>

            <div class="footer-text">AUTHORIZED ACCESS ONLY • GALAXY FEDERATION</div>
        </div>
    </div>

</body>
</html>
